version: '3.8'

services:
  # First to execute: Spin up Postgres Server
  postgres:
    image: postgres:14
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: binance
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  # Second to execute: Alembic upgrade head to create tables
  migrations:
    image: crypto_non_rt_etl_pipeline
    command: sh -c "alembic upgrade head"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_URL: postgresql://postgres:password@postgres:5432/binance
    networks:
      - app_network

  streamlit_app:
    build: .  # find the Dockerfile in the current working directory
    image: crypto_non_rt_etl_pipeline # name of the image you build
    ports:
      - "8501:8501"
    depends_on:
      migrations:
        condition: service_completed_successfully
    environment:
      POSTGRES_URL: postgresql://postgres:password@postgres:5432/binance
      CHAIN_STACK_PG_CONNECTION_STRING: postgresql+asyncpg://postgres:password@postgres:5432/binance
      PYTHONPATH: /app
    networks:
      - app_network

  minio:
    image: quay.io/minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  minio_data: